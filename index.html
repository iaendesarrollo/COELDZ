<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAPA COE</title>
    <!-- Tailwind CSS para estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PapaParse para lectura de CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Fuentes de Google (Montserrat) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB2MHti5Cy4IDKPc3Iu0ypNQg_BgsjcMoQ&callback=initMap" defer></script>

    <style>
        :root {
            --bg-main: #19567C;
            --blanco: #FFFFFF;
            --acento: #4AB5E0;
            --magenta: #D34872;
            --glass-claro: #E2F1F7;
            --azul-inst: #19567C;
            --radius-sys: 12px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-main);
            color: var(--blanco);
            min-height: 100vh;
            margin: 0;
        }
        
        /* Asegurar que el mapa no se superponga con otros elementos z-index */
        #map { z-index: 10; }

        /* Scrollbar personalizado usando la paleta */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #F3F6F9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E6EDF3; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748B; }

        /* Loader para las capas del menú */
        .layer-loading { opacity: 0.5; pointer-events: none; position: relative; }
        .layer-loading::after {
            content: "\f110"; /* FontAwesome spinner */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute; right: 0; top: 50%;
            transform: translateY(-50%);
            animation: fa-spin 2s infinite linear;
            color: var(--bg-main);
        }

        /* Estilos para los marcadores SVG personalizados en Google Maps */
        .custom-marker {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            border: 2px solid white;
            box-shadow: 0 0 3px rgba(0,0,0,0.5);
        }
        
        .custom-marker svg {
            width: 14px;
            height: 14px;
        }

        /* Efecto titilante */
        @keyframes parpadeo-recurrente {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.9); }
            50% { transform: scale(1.35); box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
        .marker-recurrent {
            animation: parpadeo-recurrente 0.85s infinite ease-in-out !important;
            border: 3px solid #DC2626 !important;
            z-index: 1000 !important; /* Para que quede por encima */
        }
        
        /* Estilos para las ventanas de información de Google Maps */
        .gm-style .gm-style-iw-c {
            padding: 0 !important; /* Quitar padding por defecto para usar el de Tailwind */
            border-radius: 8px;
        }
        .gm-style .gm-style-iw-d {
            overflow: hidden !important; /* Evitar scrollbars innecesarios */
        }
    </style>
</head>
<body class="relative min-h-screen flex flex-col">

    <!-- Encabezado Institucional (MAPA COE) -->
    <header class="bg-[var(--bg-main)] shadow-lg border-b-4 border-[var(--acento)] relative z-20 flex items-center justify-center w-full shrink-0 py-6 px-4">
        <div class="flex items-center gap-4">
            <div class="bg-[var(--blanco)] text-[var(--bg-main)] rounded-full shadow-md flex items-center justify-center h-14 w-14 shrink-0">
                <i class="fa-solid fa-map-location-dot text-2xl"></i>
            </div>
            <div class="flex flex-col">
                <h1 class="text-3xl sm:text-4xl font-extrabold text-[var(--blanco)] tracking-tight uppercase leading-none">MAPA COE</h1>
                <p class="text-[var(--acento)] font-bold text-sm sm:text-base tracking-wide mt-1">CENTRO DE OPERACIONES DE EMERGENCIAS</p>
            </div>
        </div>
    </header>

    <!-- Contenedor Único del Mapa de Análisis Territorial -->
    <div id="map-view" class="w-full max-w-[1600px] mx-auto py-8 px-4 sm:px-6 lg:px-8 flex-1 flex flex-col">
        
        <!-- Contenedor Principal del Mapa con Layout de Sidebar -->
        <div class="flex flex-col lg:flex-row gap-6 flex-1 min-h-[600px]">
            
            <!-- MENU LATERAL IZQUIERDO (Capas y Filtros) -->
            <aside class="w-full lg:w-80 bg-[#FFFFFF] rounded-xl shadow-md border border-[#E6EDF3] flex flex-col relative z-20 shrink-0 max-h-[500px] lg:max-h-[calc(100vh-140px)]">
                <div class="p-4 border-b border-[#E6EDF3] bg-[#F3F6F9] rounded-t-xl flex items-center gap-2 shrink-0">
                    <i data-lucide="layers" class="text-[#0B5F8D] h-5 w-5"></i>
                    <h3 class="font-bold text-[#0F172A] uppercase tracking-wide text-sm">Capas Disponibles</h3>
                </div>
                
                <div class="p-5 overflow-y-auto custom-scrollbar flex-1 space-y-6" id="menu-capas-container">
                    
                    <!-- BLOQUE 1: DIVISIÓN TERRITORIAL -->
                    <div>
                        <h4 class="text-xs font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i data-lucide="map" class="h-4 w-4"></i> División Territorial
                        </h4>
                        <div class="space-y-3" id="grupo-division-territorial">
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-municipio" class="w-4 h-4 accent-[var(--bg-main)] cursor-pointer" checked>
                                <span class="text-sm text-[#0F172A] group-hover:text-[var(--acento)] transition-colors font-medium">Límite Territorial (Municipio)</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-cgm" class="w-4 h-4 accent-[var(--bg-main)] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[var(--acento)] transition-colors font-medium">Centros de Gestión Municipal (CGM)</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-barrios" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Barrios Lomas de Zamora</span>
                            </label>
                        </div>
                    </div>

                    <!-- BLOQUE 2: DATOS DEMOGRÁFICOS -->
                    <div class="border-t border-[#E6EDF3] pt-4">
                        <h4 class="text-xs font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i data-lucide="pie-chart" class="h-4 w-4"></i> Datos Demográficos
                        </h4>
                        <div class="space-y-3" id="grupo-datos-demograficos">
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-poblacion" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Población</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-pobreza" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Pobreza Crónica</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-inundables" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Zonas Inundables</span>
                            </label>
                            <!-- ARROYOS -->
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-arroyos" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Arroyos</span>
                            </label>
                        </div>
                    </div>

                    <!-- BLOQUE 3: TAREAS PREVENTIVAS -->
                    <div class="border-t border-[#E6EDF3] pt-4">
                        <h4 class="text-xs font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i data-lucide="shield-alert" class="h-4 w-4"></i> Tareas Preventivas
                        </h4>
                        <div class="space-y-3" id="grupo-tareas-preventivas">
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-tareas-preventivas" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Alertas y Reclamos</span>
                            </label>

                            <!-- Contenedor de Filtros Dinámicos -->
                            <div id="filtros-tareas" class="hidden flex flex-col gap-2.5 mt-2 pl-7 border-l-2 border-[#E6EDF3] ml-2">
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por CGM</label>
                                    <select id="filtro-cgm" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los CGM</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Tipo</label>
                                    <select id="filtro-tipo" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los Tipos</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Sub Tipo</label>
                                    <select id="filtro-subtipo" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los Sub Tipos</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Fecha</label>
                                    <select id="filtro-fecha" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todas las Fechas</option>
                                    </select>
                                </div>
                            </div>

                            <!-- NUEVO: TAREAS PREVENTIVAS CGM -->
                            <label class="flex items-center gap-3 cursor-pointer group relative mt-3">
                                <input type="checkbox" id="cb-preventivas-cgm" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Tareas Preventivas CGM</span>
                            </label>

                            <!-- Contenedor de Filtros Dinámicos Preventivas CGM -->
                            <div id="filtros-preventivas-cgm" class="hidden flex flex-col gap-2.5 mt-2 pl-7 border-l-2 border-[#E6EDF3] ml-2">
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Fecha</label>
                                    <select id="filtro-prev-cgm-fecha" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todas las Fechas</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por CGM</label>
                                    <select id="filtro-prev-cgm-cgm" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los CGM</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Tarea</label>
                                    <select id="filtro-prev-cgm-tarea" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todas las Tareas</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- BLOQUE 4: EVENTOS POR TORMENTA -->
                    <div class="border-t border-[#E6EDF3] pt-4">
                        <h4 class="text-xs font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-cloud-showers-heavy text-[var(--acento)] text-lg"></i> Eventos por Tormenta
                        </h4>
                        <div class="space-y-3" id="grupo-eventos-tormenta">
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-eventos-tormenta" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Incidentes Reportados (COE)</span>
                            </label>

                            <!-- Contenedor de Filtros Dinámicos Eventos COE -->
                            <div id="filtros-eventos" class="hidden flex flex-col gap-2.5 mt-2 pl-7 border-l-2 border-[#E6EDF3] ml-2">
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Fecha</label>
                                    <select id="filtro-evt-fecha" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todas las Fechas</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por CGM</label>
                                    <select id="filtro-evt-cgm" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los CGM</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Tipo</label>
                                    <select id="filtro-evt-tipo" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los Tipos</option>
                                    </select>
                                </div>
                            </div>
                            
                            <!-- CORTES DE LUZ -->
                            <label class="flex items-center gap-3 cursor-pointer group relative mt-3">
                                <input type="checkbox" id="cb-cortes-luz" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Cortes de Luz</span>
                            </label>

                            <!-- Contenedor de Filtros Dinámicos Cortes de Luz -->
                            <div id="filtros-cortes-luz" class="hidden flex flex-col gap-2.5 mt-2 pl-7 border-l-2 border-[#E6EDF3] ml-2">
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Fecha</label>
                                    <select id="filtro-corte-fecha" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todas las Fechas</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por CGM</label>
                                    <select id="filtro-corte-cgm" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los CGM</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Afectación</label>
                                    <select id="filtro-corte-tipo" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los Tipos</option>
                                    </select>
                                </div>
                            </div>

                            <!-- ARROYOS DESBORDADOS -->
                            <label class="flex items-center gap-3 cursor-pointer group relative mt-3">
                                <input type="checkbox" id="cb-arroyos-desbordados" class="w-4 h-4 accent-[#DC2626] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#DC2626] transition-colors font-medium">Arroyos Desbordados</span>
                            </label>

                            <div id="filtros-arroyos-desbordados" class="hidden flex flex-col gap-2.5 mt-2 pl-7 border-l-2 border-[#E6EDF3] ml-2">
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Fecha</label>
                                    <select id="filtro-arroyo-fecha" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#DC2626] cursor-pointer">
                                        <option value="ALL">Todas las Fechas</option>
                                    </select>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- BLOQUE 5: INSTITUCIONES -->
                    <div class="border-t border-[#E6EDF3] pt-4">
                        <h4 class="text-xs font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-building-columns text-[var(--acento)] text-lg"></i> Instituciones
                        </h4>
                        <div class="space-y-3" id="grupo-instituciones">
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-asoc-civiles" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Asociaciones Civiles</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-centro-jubilados" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Centros de Jubilados</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-centros-culturales" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Centros Culturales</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-centros-sanitarios" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Centros de Atención Sanitaria</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-clubes-deportivos" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Clubes Deportivos</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-comedores" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Comedores</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-establecimientos-educativos" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Establecimientos Educativos</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-fundaciones" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Fundaciones</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-iglesias" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Iglesias</span>
                            </label>

                                <input type="checkbox" id="cb-soc-fomento" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">

        // Función para crear iconos para Google Maps a partir de SVGs
        function createGoogleMarkerIcon(svgString, bgColor, isRecurrent = false) {
            const svgContent = encodeURIComponent(svgString);
            const extraStyle = isRecurrent ? `animation: parpadeo-recurrente 0.85s infinite ease-in-out; border: 3px solid #DC2626;` : `border: 2px solid white; box-shadow: 0 0 3px rgba(0,0,0,0.5);`;
            
            const html = `
                <div style="position: absolute; transform: translate(-50%, -50%);">
                    <div style="width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: ${bgColor}; color: #FFFFFF; ${extraStyle}">
                        <img src="data:image/svg+xml;utf8,${svgContent.replace(/currentColor/g, '%23FFFFFF')}" style="width: 14px; height: 14px;" />
                    </div>
                </div>
            `;
            
            // Usando AdvancedMarkerElement (requerido en nuevas APIs de Google Maps)
            const el = document.createElement('div');
            el.innerHTML = html;
            return el;
        }

        // Función base para sanear geometrías GeoJSON mal formadas
        function sanearGeoJSON(data) {
            if (!data || !data.features || !Array.isArray(data.features)) return data;
            
            data.features.forEach(feature => {
                if (feature && feature.geometry && feature.geometry.coordinates) {
                    let coords = feature.geometry.coordinates;
                    if (Array.isArray(coords) && coords.length === 2 && typeof coords[0] === 'string' && typeof coords[1] === 'string' && !coords[0].includes(',')) {
                        let lng = parseFloat(coords[0]);
                        let lat = parseFloat(coords[1]);
                        if (!isNaN(lng) && !isNaN(lat)) {
                            feature.geometry.coordinates = [lng, lat];
                        } else {
                            feature.geometry.coordinates = null;
                        }
                    }
                    else if (Array.isArray(coords) && coords.length > 0 && typeof coords[0] === 'string' && coords[0].includes(',')) {
                        let nuevasCoordenadas = [];
                        for (let i = 0; i < coords.length; i++) {
                            let coordStr = coords[i];
                            if (coordStr && typeof coordStr === 'string') {
                                let partes = coordStr.split(',');
                                if (partes.length >= 2) {
                                    let lat = parseFloat(partes[0].trim());
                                    let lng = parseFloat(partes[1].trim());
                                    if (!isNaN(lat) && !isNaN(lng)) {
                                        nuevasCoordenadas.push([lng, lat]);
                                    }
                                }
                            }
                        }
                        if (nuevasCoordenadas.length === 0) {
                            feature.geometry.coordinates = null;
                        } else if (feature.geometry.type === "Point") {
                            feature.geometry.coordinates = nuevasCoordenadas[0];
                        } else {
                            feature.geometry.type = "MultiPoint";
                            feature.geometry.coordinates = nuevasCoordenadas;
                        }
                    }
                }
            });
            data.features = data.features.filter(feature => feature && feature.geometry && feature.geometry.coordinates);
            return data;
        }

        // --- FUNCIONES DE RENDERIZADO ADAPTADAS A GOOGLE MAPS ---

        function actualizarLimitesMapaGoogle(elementos) {
            if (!map || elementos.length === 0) return;
            const bounds = new google.maps.LatLngBounds();
            
            elementos.forEach(el => {
                if (el.position) {
                    bounds.extend(el.position);
                } else if (el.getPath) {
                    el.getPath().forEach(latLng => bounds.extend(latLng));
                } else if (el.getPaths) {
                    el.getPaths().forEach(path => {
                        path.forEach(latLng => bounds.extend(latLng));
                    });
                }
            });
            
            map.fitBounds(bounds);
            
            // Si es un solo punto, acercar un poco
            if (elementos.length === 1 && elementos[0].position) {
                map.setZoom(16);
            }
        }

        function createPopupHtml(title, properties, titleColor = 'var(--bg-main)', extraHeader = '', keysToIgnore = ['NOMBRE', 'NAME', 'Name', 'nombre', 'name']) {
            let html = `<div class="font-sans min-w-[200px] p-2">
                        <h4 class="font-bold border-b border-[#E6EDF3] pb-1 mb-2" style="color: ${titleColor};">${title}</h4>
                        ${extraHeader}
                        <ul class="text-xs text-[#64748B] space-y-1">`;
            for (let key in properties) {
                if (!keysToIgnore.includes(key) && properties[key] !== null && properties[key] !== "") {
                    html += `<li><b class="capitalize text-[#0F172A]">${key.replace(/_/g, ' ')}:</b> ${properties[key]}</li>`;
                }
            }
            html += `</ul></div>`;
            return html;
        }

        function renderizarCapaGenerica(data, layerId, styleOptions) {
            data = sanearGeoJSON(data);
            mapLayers[layerId] = [];

            data.features.forEach(feature => {
                if (feature.geometry.type === 'Point' || feature.geometry.type === 'MultiPoint') {
                    const coords = feature.geometry.type === 'Point' ? [feature.geometry.coordinates] : feature.geometry.coordinates;
                    
                    coords.forEach(coord => {
                        const latLng = { lat: coord[1], lng: coord[0] };
                        let marker;

                        if (styleOptions && styleOptions.tipo === 'punto' && styleOptions.svg) {
                            marker = new google.maps.marker.AdvancedMarkerElement({
                                map: map,
                                position: latLng,
                                content: createGoogleMarkerIcon(styleOptions.svg, styleOptions.color || '#0B5F8D')
                            });
                        } else {
                            // Círculo básico si no hay SVG
                            marker = new google.maps.Circle({
                                strokeColor: styleOptions.color || '#FFFFFF',
                                strokeOpacity: 1,
                                strokeWeight: styleOptions.weight || 2,
                                fillColor: styleOptions.fillColor || '#0B5F8D',
                                fillOpacity: 0.9,
                                map: map,
                                center: latLng,
                                radius: (styleOptions.radius || 6) * 10 // Aproximación metros
                            });
                        }

                        let props = feature.properties;
                        let nombreStr = props.NOMBRE || props.NAME || props.Name || props.nombre || props.name || "Elemento";
                        
                        marker.addListener('click', () => {
                            infoWindow.setContent(createPopupHtml(nombreStr, props));
                            if (marker instanceof google.maps.Circle) {
                                infoWindow.setPosition(latLng);
                                infoWindow.open(map);
                            } else {
                                infoWindow.open(map, marker);
                            }
                        });

                        mapLayers[layerId].push(marker);
                    });
                } else if (feature.geometry.type === 'Polygon' || feature.geometry.type === 'MultiPolygon') {
                    // Para polígonos, usamos Data Layer para mayor facilidad
                    map.data.addGeoJson(feature);
                    // Como Data es global, aplicamos un property trick para saber a qué capa pertenece
                    feature.properties._layerId = layerId;
                    
                    map.data.setStyle(function(f) {
                        if (f.getProperty('_layerId') === layerId) {
                            return {
                                strokeColor: styleOptions.strokeColor || '#0B5F8D',
                                strokeWeight: styleOptions.strokeWeight || 2,
                                fillColor: styleOptions.fillColor || '#0B5F8D',
                                fillOpacity: styleOptions.fillOpacity || 0.1,
                                strokeDasharray: styleOptions.strokeDasharray || null
                            };
                        }
                    });
                } else if (feature.geometry.type === 'LineString') {
                    const path = feature.geometry.coordinates.map(c => ({ lat: c[1], lng: c[0] }));
                    const line = new google.maps.Polyline({
                        path: path,
                        strokeColor: styleOptions.color || '#0B5F8D',
                        strokeOpacity: styleOptions.opacity || 1.0,
                        strokeWeight: styleOptions.weight || 3,
                        map: map
                    });
                    
                    let props = feature.properties;
                    let nombreStr = props.NOMBRE || props.NAME || props.Name || props.nombre || props.name || "Elemento";
                    
                    line.addListener('click', (e) => {
                        infoWindow.setContent(createPopupHtml(nombreStr, props));
                        infoWindow.setPosition(e.latLng);
                        infoWindow.open(map);
                    });
                    
                    mapLayers[layerId].push(line);
                }
            });
            
            // Para Data Layer no podemos hacer fitBounds directamente, habría que iterar. Lo omitimos para polígonos grandes
            if (mapLayers[layerId].length > 0) {
                actualizarLimitesMapaGoogle(mapLayers[layerId]);
            }
        }

        // --- RENDERIZADOS DEMOGRÁFICOS ---

        function renderizarCapaPoblacion(data, layerId) {
            data = sanearGeoJSON(data);
            mapLayers[layerId] = []; // En Gmaps usaremos Data Layer pero registramos para toggle
            
            let maxVal = 0;
            data.features.forEach(f => {
                let val = f.properties['Habitantes'] || f.properties['RADIOS_POB'] || 0;
                if(typeof val === 'string') val = parseFloat(val.replace(/[^\d.-]/g, '')) || 0;
                if (val > maxVal) maxVal = val;
                
                f.properties._layerId = layerId;
                f.properties._val = val;
                map.data.addGeoJson(f);
            });

            function getColor(d) {
                if(!maxVal || d === undefined) return '#F3F6F9'; 
                return d > maxVal * 0.8 ? '#084A6F' : d > maxVal * 0.6 ? '#0B5F8D' : d > maxVal * 0.4 ? '#2A7FA8' : d > maxVal * 0.2 ? '#6BA1C7' : '#D1E1F0';  
            }

            map.data.setStyle(function(f) {
                if (f.getProperty('_layerId') === layerId) {
                    return {
                        fillColor: getColor(f.getProperty('_val')),
                        strokeWeight: 2,
                        strokeColor: 'white',
                        fillOpacity: 0.85
                    };
                }
            });
        }

        function renderizarCapaPobreza(data, layerId) {
            data = sanearGeoJSON(data);
            mapLayers[layerId] = [];
            
            function getColor(d) {
                if(d === undefined || d === null) return '#F3F6F9';
                return d >= 15 ? '#003B5C' : d >= 10 ? '#084A6F' : d >= 5  ? '#0B5F8D' : d >= 2  ? '#2A7FA8' : d > 0   ? '#6BA1C7' : '#EAF1F7';
            }

            data.features.forEach(f => {
                let val = f.properties['P_PC_HOG'] || 0;
                if(typeof val === 'string') val = parseFloat(val.replace(/[^\d.-]/g, '')) || 0;
                
                f.properties._layerId = layerId;
                f.properties._val = val;
                f.properties._tipo = 'pobreza';
                map.data.addGeoJson(f);
            });

            map.data.setStyle(function(f) {
                if (f.getProperty('_layerId') === layerId) {
                    return {
                        fillColor: getColor(f.getProperty('_val')),
                        strokeWeight: 1,
                        strokeColor: 'white',
                        fillOpacity: 0.85
                    };
                }
            });
        }

        function renderizarCapaInundables(data, layerId) {
            data = sanearGeoJSON(data);
            mapLayers[layerId] = [];
            
            function getColor(d) {
                if(d === undefined || d === null) return '#F3F6F9'; 
                return d >= 80 ? '#DC2626' : d >= 60 ? '#084A6F' : d >= 40 ? '#0B5F8D' : d >= 20 ? '#2A7FA8' : '#D1E1F0';  
            }

            data.features.forEach(f => {
                let val = f.properties['PORCENTAJE'];
                if(typeof val === 'string') val = parseFloat(val.replace(/[^\d.-]/g, '')) || 0;
                
                f.properties._layerId = layerId;
                f.properties._val = val;
                f.properties._tipo = 'inundable';
                map.data.addGeoJson(f);
            });

            map.data.setStyle(function(f) {
                if (f.getProperty('_layerId') === layerId) {
                    return {
                        fillColor: getColor(f.getProperty('_val')),
                        strokeWeight: 2,
                        strokeColor: 'white',
                        fillOpacity: 0.85
                    };
                }
            });
        }

        function renderizarCapaArroyos(data, layerId) {
            data = sanearGeoJSON(data);
            mapLayers[layerId] = [];
            
            data.features.forEach(feature => {
                if (feature.geometry.type === 'LineString') {
                    const path = feature.geometry.coordinates.map(c => ({ lat: c[1], lng: c[0] }));
                    const line = new google.maps.Polyline({

                        strokeColor: '#4AB5E0',
                        strokeOpacity: 0.9,
                        strokeWeight: 4,
                        map: map

                    let props = feature.properties;
                    let name = props.name || props.NOMBRE || props.Name || "Arroyo";

        function poblarFiltrosTareas() {
            const cgms = new Set();
            const tipos = new Set();
            const subtipos = new Set();
            const fechas = new Set();

            window.sgrData.forEach(row => {
                if (row.Zonificacion_CAV) cgms.add(row.Zonificacion_CAV.trim());
                if (row.Tipo) tipos.add(row.Tipo.trim());
                if (row['Sub Tipo']) subtipos.add(row['Sub Tipo'].trim());
                if (row.Fecha) fechas.add(row.Fecha.trim());
            });

            const poblarSelect = (id, setValores) => {
                const select = document.getElementById(id);
                select.innerHTML = select.options[0].outerHTML; 
                Array.from(setValores).sort().forEach(val => {
                    if (val === '') return;
                    const opt = document.createElement('option');
                    opt.value = val;
                    opt.textContent = val;
                    select.appendChild(opt);
                });
            };

            poblarSelect('filtro-cgm', cgms);
            poblarSelect('filtro-tipo', tipos);
            poblarSelect('filtro-subtipo', subtipos);

            const arrayFechas = Array.from(fechas).filter(f => f !== '').sort((a,b) => {
                const [d1, m1, y1] = a.split('/');
                const [d2, m2, y2] = b.split('/');
                return new Date(y2, m2-1, d2) - new Date(y1, m1-1, d1);
            });
            
            const selectFecha = document.getElementById('filtro-fecha');
            selectFecha.innerHTML = selectFecha.options[0].outerHTML;
            arrayFechas.forEach(val => {
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = val;
                selectFecha.appendChild(opt);
            });
        }

        function filtrarYRenderizarTareas() {
            clearMapLayer('tareasPreventivas');
            
            const fCgm = document.getElementById('filtro-cgm').value;
            const fTipo = document.getElementById('filtro-tipo').value;
            const fSubtipo = document.getElementById('filtro-subtipo').value;
            const fFecha = document.getElementById('filtro-fecha').value;

            window.sgrData.forEach(row => {

                const tipo = (row.Tipo || '').trim();
                const subtipo = (row['Sub Tipo'] || '').trim();
                const fecha = (row.Fecha || '').trim();

                if (fCgm !== 'ALL' && cgm !== fCgm) return;

                const lat = parseFloat(row.Latitud.replace(',', '.'));
                const lng = parseFloat(row.Longitud.replace(',', '.'));
                if (isNaN(lat) || isNaN(lng)) return;

                let isSolucionado = estado === 'solucionado';
                let bgColor = isSolucionado ? '#16A34A' : '#0B5F8D'; 
                let svgIcono = isSolucionado ? svgIconos.check : svgIconos.preventiva;

                const marker = new google.maps.marker.AdvancedMarkerElement({

                    position: {lat: lat, lng: lng},

        function filtrarYRenderizarEventos() {
            clearMapLayer('eventosTormenta');

            const fTipo = document.getElementById('filtro-evt-tipo').value;
            const fFecha = document.getElementById('filtro-evt-fecha').value;

            const eventosAgrupados = {};

            window.coeData.forEach(row => {
                const cgm = (row.CGM || '').trim();
                const tipo = (row['Tipo Evento'] || '').trim();
                const fecha = (row.Fecha || '').trim();

                if (fCgm !== 'ALL' && cgm !== fCgm) return;
                if (fTipo !== 'ALL' && tipo !== fTipo) return;
                if (fFecha !== 'ALL' && fecha !== fFecha) return;

                let coordsStr = (row.Coordenadas || "").trim();
                if (!coordsStr) return;
                coordsStr = coordsStr.replace(/['"]/g, '');
                let parts = coordsStr.split(',');
                if (parts.length < 2) return;

                const lat = parseFloat(parts[0].trim());
                const lng = parseFloat(parts[1].trim());

                if (isNaN(lat) || isNaN(lng)) return;

                const key = `${lat},${lng}`;
                if (!eventosAgrupados[key]) eventosAgrupados[key] = [];
                eventosAgrupados[key].push(row);
            });

            for (const key in eventosAgrupados) {
                const grupo = eventosAgrupados[key];
                const [latStr, lngStr] = key.split(',');
                const lat = parseFloat(latStr);
                const lng = parseFloat(lngStr);
                const isRecurrent = grupo.length > 1;

                const primerEvento = grupo[0];
                const tipo = primerEvento['Tipo Evento'] || '';
                
                let tipoEventoLower = tipo.toLowerCase();
                let svgUsado = svgIconos.alerta;
                let bgColor = '#D34872'; 

                if (tipoEventoLower.includes('anegamiento') || tipoEventoLower.includes('agua') || tipoEventoLower.includes('inundacion')) {
                    svgUsado = svgIconos.anegamiento;
                    bgColor = '#4AB5E0';

                    svgUsado = svgIconos.arbol;
                    bgColor = '#19567C'; 
                } else if (tipoEventoLower.includes('poste') || tipoEventoLower.includes('cable') || tipoEventoLower.includes('luz')) {
                    svgUsado = svgIconos.poste;
                    bgColor = '#F59E0B';

                const marker = new google.maps.marker.AdvancedMarkerElement({
                    map: map,
                    position: {lat: lat, lng: lng},
                    content: createGoogleMarkerIcon(svgUsado, bgColor, isRecurrent)
                });

                let popupHtml = `<div class="font-sans min-w-[240px] p-2">`;
                if (isRecurrent) {
                    popupHtml += `<div class="bg-[#FEF2F2] text-[#DC2626] text-[10px] font-bold px-2 py-1.5 rounded mb-2 uppercase flex items-center gap-1.5 border border-[#FECACA]"><i class="fa-solid fa-triangle-exclamation"></i> ALERTA: PUNTO RECURRENTE (${grupo.length} Reportes)</div>`;
                }
                popupHtml += `<h4 class="font-bold border-b border-[#E6EDF3] pb-1 mb-2" style="color: ${bgColor};">${isRecurrent ? 'Múltiples Incidentes' : tipo}</h4>
                    <div class="max-h-[160px] overflow-y-auto custom-scrollbar pr-1 space-y-2">`;

                grupo.forEach(row => {
                    popupHtml += `
                        <div class="bg-[#F8FAFC] p-2 rounded border border-[#E2E8F0]">
                            <p class="text-xs font-bold text-[#0F172A] mb-1 leading-tight">${row['Tipo Evento']}</p>
                            <ul class="text-[10px] text-[#64748B] space-y-0.5">

                                <li><b class="text-[#475569]">Dirección:</b> ${row.Direccion || '-'}</li>

                });

                marker.addListener('click', () => {
                    infoWindow.setContent(popupHtml);
                    infoWindow.open(map, marker);
                });
                
                mapLayers['eventosTormenta'].push(marker);
            }

            if (mapLayers['eventosTormenta'].length > 0) {
                actualizarLimitesMapaGoogle(mapLayers['eventosTormenta']);
            }
        }

            window.cortesData.forEach(row => {

                if (row.TIPO_AFECTACION) tipos.add(row.TIPO_AFECTACION.trim());
                if (row.FECHA) fechas.add(row.FECHA.trim());
            });

            const poblarSelect = (id, setValores) => {
                const select = document.getElementById(id);
                select.innerHTML = select.options[0].outerHTML; 
                Array.from(setValores).sort().forEach(val => {
                    if (val === '') return;
                    const opt = document.createElement('option');
                    opt.value = val;
                    opt.textContent = val;
                    select.appendChild(opt);
                });
            };

            poblarSelect('filtro-corte-cgm', cgms);
            poblarSelect('filtro-corte-tipo', tipos);

            const arrayFechas = Array.from(fechas).filter(f => f !== '').sort((a,b) => b.localeCompare(a));
            const selectFecha = document.getElementById('filtro-corte-fecha');
            selectFecha.innerHTML = selectFecha.options[0].outerHTML;
            arrayFechas.forEach(val => {
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = val;
                selectFecha.appendChild(opt);
            });
        }

        function filtrarYRenderizarCortes() {
            clearMapLayer('cortesLuz');
            
            const fCgm = document.getElementById('filtro-corte-cgm').value;
            const fTipo = document.getElementById('filtro-corte-tipo').value;
            const fFecha = document.getElementById('filtro-corte-fecha').value;

            window.cortesData.forEach(row => {
                const cgm = (row.CGM || '').trim();
                const tipo = (row.TIPO_AFECTACION || '').trim();
                const fecha = (row.FECHA || '').trim();

                if (fCgm !== 'ALL' && cgm !== fCgm) return;
                if (fTipo !== 'ALL' && tipo !== fTipo) return;
                if (fFecha !== 'ALL' && fecha !== fFecha) return;

                let coordsStr = (row.COORDENADAS || "").trim();
                if (!coordsStr) return;
                coordsStr = coordsStr.replace(/['"]/g, '');
                let parts = coordsStr.split(',');
                if (parts.length < 2) return;

                const lat = parseFloat(parts[0].trim());
                const lng = parseFloat(parts[1].trim());

                if (isNaN(lat) || isNaN(lng)) return;

                let bgColor = '#F59E0B'; 

                const marker = new google.maps.marker.AdvancedMarkerElement({
                    map: map,
                    position: {lat: lat, lng: lng},
                    content: createGoogleMarkerIcon(svgIconos.energia, bgColor)
                });

                let usuariosInfo = (row.USUARIOS_AFECTADOS && row.USUARIOS_AFECTADOS !== '') ? Number(row.USUARIOS_AFECTADOS).toLocaleString('es-AR') : 'Sin datos';

                let popupHtml = `
                    <div class="font-sans min-w-[220px] p-2">
                        <h4 class="font-bold border-b border-[#E6EDF3] pb-1 mb-2" style="color: ${bgColor};"><i class="fa-solid fa-bolt mr-1"></i> ${tipo}</h4>
                        <div class="bg-[#FFFBEB] p-2 rounded-md mb-2 border border-[#FEF3C7]">
                            <p class="text-[10px] font-bold text-[#D97706] uppercase">Usuarios Afectados</p>
                            <p class="text-lg font-extrabold text-[#B45309]">${usuariosInfo}</p>
                        </div>
                        <ul class="text-xs text-[#64748B] space-y-1.5">
                            <li><b class="text-[#0F172A]">Fecha:</b> ${fecha}</li>
                            <li><b class="text-[#0F172A]">Inicio:</b> ${row.HORA_INICIO || '-'}</li>
                            <li><b class="text-[#0F172A]">Fin:</b> ${row.HORA_FIN || '-'}</li>
                            <li><b class="text-[#0F172A]">Duración:</b> ${row.DURACION_CORTE || '-'}</li>
                            <li><b class="text-[#0F172A]">CGM:</b> ${cgm || '-'}</li>
                        </ul>
                    </div>`;
                
                marker.addListener('click', () => {
                    infoWindow.setContent(popupHtml);
                    infoWindow.open(map, marker);
                });
                
                mapLayers['cortesLuz'].push(marker);
            });

            if (mapLayers['cortesLuz'].length > 0) {
                actualizarLimitesMapaGoogle(mapLayers['cortesLuz']);
            }
        }

        // ---------- ARROYOS DESBORDADOS -----------
        async function cargarArroyosDesbordados() {
            const cb = document.getElementById('cb-arroyos-desbordados');
            const label = cb.closest('label');
            label.classList.add('layer-loading');

            try {
                const [csvRes, geoRes] = await Promise.all([
                    fetch('./arroyos.csv'),
                    fetch('./ARROYOS.geojson')
                ]);

                if (!csvRes.ok) throw new Error("Archivo arroyos.csv no encontrado.");
                if (!geoRes.ok) throw new Error("Archivo ARROYOS.geojson no encontrado.");

                const csvText = await csvRes.text();
                const geoData = await geoRes.json();

                window.arroyosGeojsonData = sanearGeoJSON(geoData);

                const cleanCsvText = csvText.replace(/^\uFEFF/, '');
                
                Papa.parse(cleanCsvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        window.arroyosCsvData = results.data;
                        arroyosDesbordadosLoaded = true;
                        document.getElementById('filtros-arroyos-desbordados').classList.remove('hidden');
                        poblarFiltrosArroyosDesbordados();
                        filtrarYRenderizarArroyosDesbordados();
                        label.classList.remove('layer-loading');
                    }
                });
            } catch(err) {
                console.error("Error al cargar Arroyos Desbordados:", err);
                alert("Error al cargar datos de arroyos. Verifica archivos locales.");
                cb.checked = false;
                label.classList.remove('layer-loading');
            }
        }

        function poblarFiltrosArroyosDesbordados() {
            const fechas = new Set();

            window.arroyosCsvData.forEach(row => {
                if (row.Fecha) fechas.add(row.Fecha.trim());
            });

            const arrayFechas = Array.from(fechas).filter(f => f !== '').sort((a,b) => b.localeCompare(a));
            const selectFecha = document.getElementById('filtro-arroyo-fecha');
            selectFecha.innerHTML = selectFecha.options[0].outerHTML;
            arrayFechas.forEach(val => {
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = val;
                selectFecha.appendChild(opt);
            });
        }

        function filtrarYRenderizarArroyosDesbordados() {
            clearMapLayer('arroyosDesbordados');
            
            const fFecha = document.getElementById('filtro-arroyo-fecha').value;

            let desbordadosMap = {}; 
            
            window.arroyosCsvData.forEach(row => {
                const fecha = (row.Fecha || '').trim();
                const estado = (row.Estado_Arroyo || '').trim().toUpperCase();
                const nombre = (row.Arroyo || '').trim();

                if (estado !== 'DESBORDADO') return;
                if (fFecha !== 'ALL' && fecha !== fFecha) return;

                if (!desbordadosMap[nombre]) desbordadosMap[nombre] = [];
                desbordadosMap[nombre].push(row);
            });

            if (Object.keys(desbordadosMap).length === 0) return;

            window.arroyosGeojsonData.features.forEach(feature => {
                let name = feature.properties.name || feature.properties.NOMBRE || feature.properties.Name;
                if (!name || !desbordadosMap[name]) return;

                if (feature.geometry.type === 'LineString') {
                    const path = feature.geometry.coordinates.map(c => ({ lat: c[1], lng: c[0] }));
                    const line = new google.maps.Polyline({
                        path: path,
                        strokeColor: '#DC2626',
                        strokeOpacity: 0.9,
                        strokeWeight: 6,
                        map: map
                    });

                    let umbral = feature.properties.umbral_desborde || feature.properties['UMBRAL DESBORDE'] || "Sin datos";
                    let registros = desbordadosMap[name];
                    
                    let popupHtml = `<div class="font-sans min-w-[240px] p-2">
                        <h4 class="font-bold text-[#DC2626] border-b border-[#FECACA] pb-1.5 mb-2 flex items-center gap-1">
                            <i class="fa-solid fa-water"></i> Desborde: ${name}
                        </h4>
                        <div class="mb-2 text-xs">
                            <b class="text-[#0F172A]">Umbral de Desborde:</b> <span class="text-[#DC2626] font-bold">${umbral} mts</span>
                        </div>
                        <div class="max-h-[180px] overflow-y-auto custom-scrollbar pr-1 space-y-2">`;
                    
                    registros.forEach(r => {
                        let cgmStr = r.CGM ? `(CGM: ${r.CGM})` : '';
                        popupHtml += `
                            <div class="bg-[#FEF2F2] p-2 rounded border border-[#FECACA] text-xs">
                                <p><b class="text-[#0F172A]">${r.Fecha} ${r.Hora}</b> ${cgmStr}</p>
                                <p class="text-[#B91C1C] mt-0.5"><b>Nivel Medido:</b> ${r['Nivel Arroyo']} cm</p>
                            </div>`;
                    });

                    popupHtml += `</div></div>`;
                    
                    line.addListener('click', (e) => {
                        infoWindow.setContent(popupHtml);
                        infoWindow.setPosition(e.latLng);
                        infoWindow.open(map);
                    });

                    mapLayers['arroyosDesbordados'].push(line);
                }
            });

            if (mapLayers['arroyosDesbordados'] && mapLayers['arroyosDesbordados'].length > 0) {
                actualizarLimitesMapaGoogle(mapLayers['arroyosDesbordados']);
            }
        }

        // LÓGICA PRINCIPAL DE INICIALIZACIÓN
        function initMap() {
            const mapContainer = document.getElementById('map');
            if (!mapContainer) return;

            // Iniciar mapa de Google Maps con Map ID requerido para AdvancedMarkerElement
            map = new google.maps.Map(mapContainer, {
                center: { lat: -34.7573, lng: -58.4035 },
                zoom: 12,
                mapId: 'DEMO_MAP_ID', // Requerido para AdvancedMarkerElement
                streetViewControl: true, // Esto activa a Pegman!
                streetViewControlOptions: {
                    position: google.maps.ControlPosition.RIGHT_BOTTOM
                },
                mapTypeControl: false,
                fullscreenControl: true
            });

            infoWindow = new google.maps.InfoWindow();

            // Setup de popup global de datos (polígonos)
            map.data.addListener('click', function(event) {
                let f = event.feature;
                let layerId = f.getProperty('_layerId');
                let props = {};
                f.forEachProperty((val, name) => props[name] = val);
                
                let html = '';
                if (f.getProperty('_tipo') === 'pobreza') {
                     let radioStr = props.LINK_RADIO || "Sector Censal";
                        let pctHogares = props.P_PC_HOG || 0;
                        let pctPersonas = props.P_PC_PER || 0;
                        let valHogares = props.PC_HOG || 0;
                        let valPersonas = props.PC_PER || 0;
                        
                        html = `
                            <div class="font-sans min-w-[220px] p-2">
                                <h4 class="font-bold text-[#0B5F8D] border-b border-[#E6EDF3] pb-1 mb-2">Sector / Radio: ${radioStr}</h4>
                                <div class="bg-[#FFF5F8] p-2 rounded-md mb-2 border border-[#FBCFE8]">
                                    <p class="text-xs font-bold text-[#D34872] uppercase">Incidencia (Hogares)</p>
                                    <p class="text-xl font-extrabold text-[#BE185D]">${pctHogares}%</p>
                                </div>
                                <ul class="text-xs text-[#64748B] space-y-1.5">
                                    <li><b class="text-[#0F172A]">Incidencia (Personas):</b> ${pctPersonas}%</li>
                                    <li><b class="text-[#0F172A]">Hogares Afectados:</b> ${Number(valHogares).toLocaleString('es-AR')}</li>
                                    <li><b class="text-[#0F172A]">Personas Afectadas:</b> ${Number(valPersonas).toLocaleString('es-AR')}</li>
                                </ul>
                            </div>`;
                } else if (f.getProperty('_tipo') === 'inundable') {
                    let radioStr = props.REDCODE || props.LINK_RADIO || props.NOMBRE || "Sector Geográfico";
                    let pctRiesgo = props.PORCENTAJE || props.ZONA_INUND || 0;
                    let pobAfectada = props.POBLACION || props.RADIOS_POB || 0;
                    let hogAfectados = props.RADIOS_HOG || 0;
                    
                    html = `
                        <div class="font-sans min-w-[200px] p-2">
                            <h4 class="font-bold text-[#0B5F8D] border-b border-[#E6EDF3] pb-1 mb-2">Sector / Radio: ${radioStr}</h4>
                            <div class="bg-[#FEF2F2] p-2 rounded-md mb-2 border border-[#FECACA]">
                                <p class="text-xs font-bold text-[#DC2626] uppercase">Riesgo de Inundación</p>
                                <p class="text-xl font-extrabold text-[#B91C1C]">${Number(pctRiesgo).toLocaleString('es-AR')}%</p>
                            </div>
                            <ul class="text-xs text-[#64748B] space-y-1">
                                <li><b class="capitalize text-[#0F172A]">Población Afectada:</b> ${Number(pobAfectada).toLocaleString('es-AR')}</li>
                                <li><b class="capitalize text-[#0F172A]">Hogares Afectados:</b> ${Number(hogAfectados).toLocaleString('es-AR')}</li>
                            </ul>
                        </div>`;
                } else if (layerId === 'cb-poblacion') {
                        let radioStr = props.REDCODE || props.RADIO || props.LINK_RADIO || props.NOMBRE || "Radio Censal";
                        let valHabitantes = props.Habitantes || props.RADIOS_POB || props.POBLACION || 0;
                        let valHogares = props.RADIOS_HOG || props.HOGARES;

                        html = `
                            <div class="font-sans min-w-[200px] p-2">
                                <h4 class="font-bold text-[#0B5F8D] border-b border-[#E6EDF3] pb-1 mb-2">Sector / Radio: ${radioStr}</h4>
                                <div class="bg-[#EAF1F7] p-2 rounded-md mb-2 border border-[#D1E1F0]">
                                    <p class="text-xs font-bold text-[#0B5F8D] uppercase">Total Habitantes</p>
                                    <p class="text-xl font-extrabold text-[#0B5F8D]">${Number(valHabitantes).toLocaleString('es-AR')}</p>
                                </div>`;
                        
                        if (valHogares !== undefined && valHogares !== null) {
                            html += `
                                <ul class="text-xs text-[#64748B] space-y-1 mt-1">
                                    <li><b class="capitalize text-[#0F172A]">Cantidad de Hogares:</b> ${Number(valHogares).toLocaleString('es-AR')}</li>
                                </ul>`;
                        }

                        html += `</div>`;
                } else {
                    let nombreStr = props.NOMBRE || props.NAME || props.Name || props.nombre || props.name || "Elemento";
                    html = createPopupHtml(nombreStr, props);
                }

                infoWindow.setContent(html);
                infoWindow.setPosition(event.latLng);
                infoWindow.open(map);
            });

            // Inicializar Data Layer vacía
            mapLayers['cb-poblacion'] = [];
            mapLayers['cb-pobreza'] = [];
            mapLayers['cb-inundables'] = [];

            // Setup de Capas
            const setupLayerControl = (checkboxId, configParams) => {
                const cb = document.getElementById(checkboxId);
                if (!cb) return;
                
                mapLayers[checkboxId] = [];
                let layerLoaded = false;

                const handleLayerToggle = async (isChecked) => {
                    if (isChecked) {
                        if (!layerLoaded) {
                            try {
                                const label = cb.closest('label');
                                label.classList.add('layer-loading');
                                
                                const safeUrl = configParams.url.replace(/ /g, '%20');
                                const response = await fetch(safeUrl);
                                
                                if (!response.ok) throw new Error("HTTP " + response.status);
                                const data = await response.json();
                                
                                if (configParams.type === 'poblacion') {
                                    renderizarCapaPoblacion(data, checkboxId);
                                } else if (configParams.type === 'pobreza') {
                                    renderizarCapaPobreza(data, checkboxId);
                                } else if (configParams.type === 'inundables') {
                                    renderizarCapaInundables(data, checkboxId);
                                } else if (configParams.type === 'arroyos') {
                                    renderizarCapaArroyos(data, checkboxId);
                                } else {
                                    renderizarCapaGenerica(data, checkboxId, configParams.style);
                                }

                                layerLoaded = true;
                            } catch (err) {
                                console.error(`Error al cargar capa: ${configParams.url}`, err);
                                alert(`No se pudo cargar la información. Verifica que el archivo exista en la ruta: ${configParams.url}`);
                                cb.checked = false;
                            } finally {
                                const label = cb.closest('label');
                                label.classList.remove('layer-loading');
                            }
                        } else {
                            if (['cb-poblacion', 'cb-pobreza', 'cb-inundables'].includes(checkboxId)) {
                                toggleDataLayer(checkboxId, true);
                            } else {
                                mapLayers[checkboxId].forEach(el => el.setMap(map));
                            }
                        }
                    } else {
                        if (['cb-poblacion', 'cb-pobreza', 'cb-inundables'].includes(checkboxId)) {
                            toggleDataLayer(checkboxId, false);
                        } else {
                            mapLayers[checkboxId].forEach(el => el.setMap(null));
                        }
                    }
                };

                cb.addEventListener('change', (e) => handleLayerToggle(e.target.checked));
            };

            // Event Listeners para CSVs
            const setupCsvLayer = (cbId, filtersId, loadFn, filterFn, dataKey, loadedFlagKey) => {
                const cb = document.getElementById(cbId);
                if (cb) {
                    mapLayers[dataKey] = [];
                    cb.addEventListener('change', (e) => {
                        if (e.target.checked) {
                            if (!window[loadedFlagKey]) window[loadFn]();
                            else {
                                window[filterFn]();
                                mapLayers[dataKey].forEach(el => el.setMap(map));
                            }
                        } else {
                            mapLayers[dataKey].forEach(el => el.setMap(null));
                            document.getElementById(filtersId).classList.add('hidden'); 
                        }
                    });
                }
            };

            window.cargarTareasPreventivas = cargarTareasPreventivas;
            window.filtrarYRenderizarTareas = filtrarYRenderizarTareas;
            setupCsvLayer('cb-tareas-preventivas', 'filtros-tareas', 'cargarTareasPreventivas', 'filtrarYRenderizarTareas', 'tareasPreventivas', 'sgrLoaded');

            ['filtro-cgm', 'filtro-tipo', 'filtro-subtipo', 'filtro-fecha'].forEach(id => {
                let el = document.getElementById(id);
                if (el) el.addEventListener('change', () => {
                    if(document.getElementById('cb-tareas-preventivas').checked) filtrarYRenderizarTareas();
                });
            });

            window.cargarPreventivasCGM = cargarPreventivasCGM;
            window.filtrarYRenderizarPreventivasCGM = filtrarYRenderizarPreventivasCGM;
            setupCsvLayer('cb-preventivas-cgm', 'filtros-preventivas-cgm', 'cargarPreventivasCGM', 'filtrarYRenderizarPreventivasCGM', 'preventivasCGM', 'prevCgmLoaded');

            ['filtro-prev-cgm-fecha', 'filtro-prev-cgm-cgm', 'filtro-prev-cgm-tarea'].forEach(id => {
                let el = document.getElementById(id);
                if (el) el.addEventListener('change', () => {
                    if(document.getElementById('cb-preventivas-cgm').checked) filtrarYRenderizarPreventivasCGM();
                });
            });

            window.cargarEventosTormenta = cargarEventosTormenta;
            window.filtrarYRenderizarEventos = filtrarYRenderizarEventos;
            setupCsvLayer('cb-eventos-tormenta', 'filtros-eventos', 'cargarEventosTormenta', 'filtrarYRenderizarEventos', 'eventosTormenta', 'coeLoaded');

            ['filtro-evt-fecha', 'filtro-evt-cgm', 'filtro-evt-tipo'].forEach(id => {
                let el = document.getElementById(id);
                if (el) el.addEventListener('change', () => {
                    if(document.getElementById('cb-eventos-tormenta').checked) filtrarYRenderizarEventos();
                });
            });

            window.cargarCortesLuz = cargarCortesLuz;
            window.filtrarYRenderizarCortes = filtrarYRenderizarCortes;
            setupCsvLayer('cb-cortes-luz', 'filtros-cortes-luz', 'cargarCortesLuz', 'filtrarYRenderizarCortes', 'cortesLuz', 'cortesLoaded');

            ['filtro-corte-fecha', 'filtro-corte-cgm', 'filtro-corte-tipo'].forEach(id => {
                let el = document.getElementById(id);
                if (el) el.addEventListener('change', () => {
                    if(document.getElementById('cb-cortes-luz').checked) filtrarYRenderizarCortes();
                });
            });

            window.cargarArroyosDesbordados = cargarArroyosDesbordados;
            window.filtrarYRenderizarArroyosDesbordados = filtrarYRenderizarArroyosDesbordados;
            setupCsvLayer('cb-arroyos-desbordados', 'filtros-arroyos-desbordados', 'cargarArroyosDesbordados', 'filtrarYRenderizarArroyosDesbordados', 'arroyosDesbordados', 'arroyosDesbordadosLoaded');

            const fArroyoFecha = document.getElementById('filtro-arroyo-fecha');
            if (fArroyoFecha) {
                fArroyoFecha.addEventListener('change', () => {
                    if(document.getElementById('cb-arroyos-desbordados').checked) filtrarYRenderizarArroyosDesbordados();
                });
            }

            // Inicializar las capas estáticas
            for (const checkboxId in CONFIG_CAPAS) {
                setupLayerControl(checkboxId, CONFIG_CAPAS[checkboxId]);
            }

            // Cargar municipio automáticamente al iniciar
            setTimeout(() => {
                const cbMuni = document.getElementById('cb-municipio');
                if (cbMuni && cbMuni.checked) {
                    cbMuni.dispatchEvent(new Event('change'));
                }
            }, 800);
        }

    </script>
