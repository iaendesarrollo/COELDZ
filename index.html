<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAPA COE</title>
    <!-- Tailwind CSS para estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PapaParse para lectura de CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Fuentes de Google (Montserrat) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Iconos Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Leaflet CSS (Para el Mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet Heat -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js" crossorigin="anonymous"></script>
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <style>
        :root {
            --bg-main: #19567C;
            --blanco: #FFFFFF;
            --acento: #4AB5E0;
            --magenta: #D34872;
            --glass-claro: #E2F1F7;
            --azul-inst: #19567C;
            --radius-sys: 12px;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-main);
            color: var(--blanco);
            min-height: 100vh;
            margin: 0;
        }
        
        /* Asegurar que el mapa no se superponga con otros elementos z-index */
        #map { z-index: 10; }
        .leaflet-control-layers { font-family: 'Montserrat', sans-serif; }

        /* Scrollbar personalizado usando la paleta */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #F3F6F9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #E6EDF3; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748B; }

        /* ESTILOS CUSTOM PARA CLUSTERS */
        .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
            background-color: rgba(11, 95, 141, 0.6) !important;
        }
        .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
            background-color: rgba(8, 74, 111, 0.9) !important;
            color: white !important;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }

        /* SISTEMA DE MARCADORES GEOESPACIALES - ZOOM AWARE */
        .custom-div-icon { background: none; border: none; }
        .marker-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        .marker-circle {
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #FFFFFF;
            transition: all 0.3s ease;
            box-shadow: none !important;
            border: none !important;
        }
        .marker-circle svg { transition: all 0.3s ease; }

        .map-zoom-far .marker-circle { width: 8px; height: 8px; }
        .map-zoom-far .marker-circle svg { width: 4px; height: 4px; stroke-width: 3px; }
        .map-zoom-medium .marker-circle { width: 12px; height: 12px; }
        .map-zoom-medium .marker-circle svg { width: 7px; height: 7px; stroke-width: 2.5px; }
        .map-zoom-high .marker-circle { width: 14px; height: 14px; }
        .map-zoom-high .marker-circle svg { width: 8px; height: 8px; stroke-width: 2px; }
        .map-zoom-high .marker-circle:hover { transform: scale(1.3); filter: brightness(1.15); }

        /* Loader para las capas del menú */
        .layer-loading { opacity: 0.5; pointer-events: none; position: relative; }
        .layer-loading::after {
            content: "\f110"; /* FontAwesome spinner */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute; right: 0; top: 50%;
            transform: translateY(-50%);
            animation: fa-spin 2s infinite linear;
            color: var(--bg-main);
        }
    </style>
</head>
<body class="relative min-h-screen flex flex-col">

    <!-- Encabezado Institucional (MAPA COE) -->
    <header class="bg-[var(--bg-main)] shadow-lg border-b-4 border-[var(--acento)] relative z-20 flex items-center justify-center w-full shrink-0 py-6 px-4">
        <div class="flex items-center gap-4">
            <div class="bg-[var(--blanco)] text-[var(--bg-main)] rounded-full shadow-md flex items-center justify-center h-14 w-14 shrink-0">
                <i class="fa-solid fa-map-location-dot text-2xl"></i>
            </div>
            <div class="flex flex-col">
                <h1 class="text-3xl sm:text-4xl font-extrabold text-[var(--blanco)] tracking-tight uppercase leading-none">MAPA COE</h1>
                <p class="text-[var(--acento)] font-bold text-sm sm:text-base tracking-wide mt-1">CENTRO DE OPERACIONES DE EMERGENCIAS</p>
            </div>
        </div>
    </header>

    <!-- Contenedor Único del Mapa de Análisis Territorial -->
    <div id="map-view" class="w-full max-w-[1600px] mx-auto py-8 px-4 sm:px-6 lg:px-8 flex-1 flex flex-col">
        
        <!-- Contenedor Principal del Mapa con Layout de Sidebar -->
        <div class="flex flex-col lg:flex-row gap-6 flex-1 min-h-[600px]">
            
            <!-- MENU LATERAL IZQUIERDO (Capas y Filtros) -->
            <aside class="w-full lg:w-80 bg-[#FFFFFF] rounded-xl shadow-md border border-[#E6EDF3] flex flex-col relative z-20 shrink-0 max-h-[500px] lg:max-h-[calc(100vh-140px)]">
                <div class="p-4 border-b border-[#E6EDF3] bg-[#F3F6F9] rounded-t-xl flex items-center gap-2 shrink-0">
                    <i data-lucide="layers" class="text-[#0B5F8D] h-5 w-5"></i>
                    <h3 class="font-bold text-[#0F172A] uppercase tracking-wide text-sm">Capas Disponibles</h3>
                </div>
                
                <div class="p-5 overflow-y-auto custom-scrollbar flex-1 space-y-6" id="menu-capas-container">
                    
                    <!-- BLOQUE 1: DIVISIÓN TERRITORIAL -->
                    <div>
                        <h4 class="text-xs font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i data-lucide="map" class="h-4 w-4"></i> División Territorial
                        </h4>
                        <div class="space-y-3" id="grupo-division-territorial">
                            <!-- CHECKBOX LIMITE TERRITORIAL MARCADO POR DEFECTO -->
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-municipio" class="w-4 h-4 accent-[var(--bg-main)] cursor-pointer" checked>
                                <span class="text-sm text-[#0F172A] group-hover:text-[var(--acento)] transition-colors font-medium">Límite Territorial (Municipio)</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-cgm" class="w-4 h-4 accent-[var(--bg-main)] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[var(--acento)] transition-colors font-medium">Centros de Gestión Municipal (CGM)</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-barrios" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Barrios Lomas de Zamora</span>
                            </label>
                        </div>
                    </div>

                    <!-- BLOQUE 2: DATOS DEMOGRÁFICOS -->
                    <div class="border-t border-[#E6EDF3] pt-4">
                        <h4 class="text-xs font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i data-lucide="pie-chart" class="h-4 w-4"></i> Datos Demográficos
                        </h4>
                        <div class="space-y-3" id="grupo-datos-demograficos">
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-poblacion" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Población</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-pobreza" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Pobreza Crónica</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-inundables" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Zonas Inundables</span>
                            </label>
                            <!-- ARROYOS -->
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-arroyos" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Arroyos</span>
                            </label>
                        </div>
                    </div>

                    <!-- BLOQUE 3: TAREAS PREVENTIVAS -->
                    <div class="border-t border-[#E6EDF3] pt-4">
                        <h4 class="text-xs font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i data-lucide="shield-alert" class="h-4 w-4"></i> Tareas Preventivas
                        </h4>
                        <div class="space-y-3" id="grupo-tareas-preventivas">
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-tareas-preventivas" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Alertas y Reclamos</span>
                            </label>

                            <!-- Contenedor de Filtros Dinámicos -->
                            <div id="filtros-tareas" class="hidden flex flex-col gap-2.5 mt-2 pl-7 border-l-2 border-[#E6EDF3] ml-2">
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por CGM</label>
                                    <select id="filtro-cgm" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los CGM</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Tipo</label>
                                    <select id="filtro-tipo" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los Tipos</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Sub Tipo</label>
                                    <select id="filtro-subtipo" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los Sub Tipos</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Fecha</label>
                                    <select id="filtro-fecha" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todas las Fechas</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- BLOQUE 4: EVENTOS POR TORMENTA -->
                    <div class="border-t border-[#E6EDF3] pt-4">
                        <h4 class="text-xs font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-cloud-showers-heavy text-[var(--acento)] text-lg"></i> Eventos por Tormenta
                        </h4>
                        <div class="space-y-3" id="grupo-eventos-tormenta">
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-eventos-tormenta" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Incidentes Reportados (COE)</span>
                            </label>

                            <!-- Contenedor de Filtros Dinámicos Eventos COE -->
                            <div id="filtros-eventos" class="hidden flex flex-col gap-2.5 mt-2 pl-7 border-l-2 border-[#E6EDF3] ml-2">
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Fecha</label>
                                    <select id="filtro-evt-fecha" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todas las Fechas</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por CGM</label>
                                    <select id="filtro-evt-cgm" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los CGM</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Tipo</label>
                                    <select id="filtro-evt-tipo" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los Tipos</option>
                                    </select>
                                </div>
                            </div>
                            
                            <!-- CORTES DE LUZ -->
                            <label class="flex items-center gap-3 cursor-pointer group relative mt-3">
                                <input type="checkbox" id="cb-cortes-luz" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Cortes de Luz</span>
                            </label>

                            <!-- Contenedor de Filtros Dinámicos Cortes de Luz -->
                            <div id="filtros-cortes-luz" class="hidden flex flex-col gap-2.5 mt-2 pl-7 border-l-2 border-[#E6EDF3] ml-2">
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Fecha</label>
                                    <select id="filtro-corte-fecha" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todas las Fechas</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por CGM</label>
                                    <select id="filtro-corte-cgm" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los CGM</option>
                                    </select>
                                </div>
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Afectación</label>
                                    <select id="filtro-corte-tipo" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#0B5F8D] cursor-pointer">
                                        <option value="ALL">Todos los Tipos</option>
                                    </select>
                                </div>
                            </div>

                            <!-- NUEVO: ARROYOS DESBORDADOS -->
                            <label class="flex items-center gap-3 cursor-pointer group relative mt-3">
                                <input type="checkbox" id="cb-arroyos-desbordados" class="w-4 h-4 accent-[#DC2626] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#DC2626] transition-colors font-medium">Arroyos Desbordados</span>
                            </label>

                            <div id="filtros-arroyos-desbordados" class="hidden flex flex-col gap-2.5 mt-2 pl-7 border-l-2 border-[#E6EDF3] ml-2">
                                <div class="flex flex-col">
                                    <label class="text-[10px] text-[#64748B] font-bold uppercase mb-1">Filtrar por Fecha</label>
                                    <select id="filtro-arroyo-fecha" class="text-xs p-1.5 rounded border border-[#E6EDF3] bg-[#F3F6F9] text-[#0F172A] w-full outline-none focus:border-[#DC2626] cursor-pointer">
                                        <option value="ALL">Todas las Fechas</option>
                                    </select>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- BLOQUE 5: INSTITUCIONES -->
                    <div class="border-t border-[#E6EDF3] pt-4">
                        <h4 class="text-xs font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-building-columns text-[var(--acento)] text-lg"></i> Instituciones
                        </h4>
                        <div class="space-y-3" id="grupo-instituciones">
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-asoc-civiles" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Asociaciones Civiles</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-centro-jubilados" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Centros de Jubilados</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-centros-culturales" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Centros Culturales</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-centros-sanitarios" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Centros de Atención Sanitaria</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-clubes-deportivos" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Clubes Deportivos</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-comedores" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Comedores</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-establecimientos-educativos" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Establecimientos Educativos</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-fundaciones" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Fundaciones</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-iglesias" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Iglesias</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-soc-fomento" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Sociedades de Fomento</span>
                            </label>
                        </div>
                    </div>

                    <!-- BLOQUE 6: SEGURIDAD -->
                    <div class="border-t border-[#E6EDF3] pt-4">
                        <h4 class="text-xs font-extrabold text-[#0B5F8D] uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-shield-halved text-[var(--acento)] text-lg"></i> Seguridad
                        </h4>
                        <div class="space-y-3" id="grupo-seguridad">
                            <label class="flex items-center gap-3 cursor-pointer group relative">
                                <input type="checkbox" id="cb-camaras" class="w-4 h-4 accent-[#0B5F8D] cursor-pointer">
                                <span class="text-sm text-[#0F172A] group-hover:text-[#0B5F8D] transition-colors font-medium">Cámaras de Seguridad</span>
                            </label>

        // Función base para sanear geometrías GeoJSON mal formadas
        function sanearGeoJSON(data) {
            if (!data || !data.features || !Array.isArray(data.features)) return data;
            
            data.features.forEach(feature => {
                if (feature && feature.geometry && feature.geometry.coordinates) {
                    let coords = feature.geometry.coordinates;
                    if (Array.isArray(coords) && coords.length === 2 && typeof coords[0] === 'string' && typeof coords[1] === 'string' && !coords[0].includes(',')) {
                        let lng = parseFloat(coords[0]);
                        let lat = parseFloat(coords[1]);
                        if (!isNaN(lng) && !isNaN(lat)) {
                            feature.geometry.coordinates = [lng, lat];
                        } else {
                            feature.geometry.coordinates = null;
                        }
                    }
                    else if (Array.isArray(coords) && coords.length > 0 && typeof coords[0] === 'string' && coords[0].includes(',')) {
                        let nuevasCoordenadas = [];
                        for (let i = 0; i < coords.length; i++) {
                            let coordStr = coords[i];
                            if (coordStr && typeof coordStr === 'string') {
                                let partes = coordStr.split(',');
                                if (partes.length >= 2) {
                                    let lat = parseFloat(partes[0].trim());
                                    let lng = parseFloat(partes[1].trim());
                                    if (!isNaN(lat) && !isNaN(lng)) {
                                        nuevasCoordenadas.push([lng, lat]);
                                    }
                                }
                            }
                        }
                        if (nuevasCoordenadas.length === 0) {
                            feature.geometry.coordinates = null;
                        } else if (feature.geometry.type === "Point") {
                            feature.geometry.coordinates = nuevasCoordenadas[0];
                        } else {
                            feature.geometry.type = "MultiPoint";
                            feature.geometry.coordinates = nuevasCoordenadas;
                        }
                    }
                }
            });
            data.features = data.features.filter(feature => feature && feature.geometry && feature.geometry.coordinates);
            return data;
        }

        // Función para encuadrar el mapa cuando se carga una capa nueva
        function actualizarLimitesMapa(layer) {
            if (!map) return;
            try {
                const bounds = layer.getBounds();
                if (bounds && bounds.isValid()) {
                    if (!mapBounds) {
                        mapBounds = bounds;
                    } else {
                        mapBounds.extend(bounds);
                    }
                    map.fitBounds(mapBounds, { padding: [30, 30] });
                }
            } catch (e) {
                console.warn("No se pudo calcular el encuadre para la capa actual.");
            }
        }

        // Motor Genérico de Renderizado (Aplica para Instituciones y División Territorial)
        function renderizarCapaGenerica(data, layerGroup, styleOptions) {
            data = sanearGeoJSON(data);
            const geoLayer = L.geoJSON(data, {
                style: styleOptions,
                pointToLayer: function (feature, latlng) {
                    if (styleOptions && styleOptions.tipo === 'punto' && styleOptions.svg) {
                        const iconHtml = `<div class="marker-container"><div class="marker-circle" style="background-color: ${styleOptions.color || '#0B5F8D'};">${styleOptions.svg}</div></div>`;
                        const customIcon = L.divIcon({
                            html: iconHtml,
                            className: 'custom-div-icon',
                            iconSize: [24, 24], 
                            iconAnchor: [12, 12]
                        });
                        return L.marker(latlng, { icon: customIcon });
                    } else {
                        let radius = styleOptions && styleOptions.radius ? styleOptions.radius : 6;
                        let fillColor = styleOptions && styleOptions.fillColor ? styleOptions.fillColor : "#0B5F8D";
                        let color = styleOptions && styleOptions.color ? styleOptions.color : "#FFFFFF";
                        let weight = styleOptions && styleOptions.weight ? styleOptions.weight : 2;
                        return L.circleMarker(latlng, { radius: radius, fillColor: fillColor, color: color, weight: weight, opacity: 1, fillOpacity: 0.9 });
                    }
                },
                onEachFeature: function (feature, layer) {
                    if (feature.properties) {
                        let props = feature.properties;
                        let nombreStr = props.NOMBRE || props.NAME || props.Name || props.nombre || props.name || "Elemento";
                        
                        let popupHtml = `<div class="font-sans min-w-[200px]"><h4 class="font-bold text-[var(--bg-main)] border-b border-[#E6EDF3] pb-1 mb-2">${nombreStr}</h4><ul class="text-xs text-[#64748B] space-y-1">`;
                        const keysToIgnore = ['NOMBRE', 'NAME', 'Name', 'nombre', 'name'];
                        for (let key in props) {
                            if (!keysToIgnore.includes(key) && props[key] !== null && props[key] !== "") {
                                popupHtml += `<li><b class="capitalize">${key.replace(/_/g, ' ')}:</b> ${props[key]}</li>`;
                            }
                        }
                        popupHtml += `</ul></div>`;
                        layer.bindPopup(popupHtml);
                    }
                }
            });
            geoLayer.addTo(layerGroup);
            actualizarLimitesMapa(geoLayer);
        }

        /* -----------------------------------------------------------
           RENDERIZADOS DEMOGRÁFICOS ENFOCADOS (ATLAS UI)
        ------------------------------------------------------------- */

        function renderizarCapaPoblacion(data, layerGroup) {
            data = sanearGeoJSON(data);

            let maxVal = 0;
            data.features.forEach(f => {
                let val = f.properties['Habitantes'] || f.properties['RADIOS_POB'] || 0;
                if(typeof val === 'string') val = parseFloat(val.replace(/[^\d.-]/g, '')) || 0;
                if (val > maxVal) maxVal = val;
            });

            function getColor(d) {
                if(!maxVal || d === undefined) return '#F3F6F9'; 
                return d > maxVal * 0.8 ? '#084A6F' : d > maxVal * 0.6 ? '#0B5F8D' : d > maxVal * 0.4 ? '#2A7FA8' : d > maxVal * 0.2 ? '#6BA1C7' : '#D1E1F0';  
            }

            const geoLayer = L.geoJSON(data, {
                style: function (feature) {
                    let val = feature.properties['Habitantes'] || feature.properties['RADIOS_POB'] || 0;
                    if(typeof val === 'string') val = parseFloat(val.replace(/[^\d.-]/g, '')) || 0;
                    return { fillColor: getColor(val), weight: 2, opacity: 1, color: 'white', dashArray: '3', fillOpacity: 0.85 };
                },
                onEachFeature: function (feature, layer) {

                        let props = feature.properties;

        function renderizarCapaPobreza(data, layerGroup) {

        function renderizarCapaInundables(data, layerGroup) {
            data = sanearGeoJSON(data);

                if(d === undefined || d === null) return '#F3F6F9'; 
                return d >= 80 ? '#DC2626' : d >= 60 ? '#084A6F' : d >= 40 ? '#0B5F8D' : d >= 20 ? '#2A7FA8' : '#D1E1F0';  
            }

            const geoLayer = L.geoJSON(data, {

        function filtrarYRenderizarEventos() {
            layerEventosTormenta.clearLayers();
            
            const fCgm = document.getElementById('filtro-evt-cgm').value;
            const fTipo = document.getElementById('filtro-evt-tipo').value;
            const fFecha = document.getElementById('filtro-evt-fecha').value;

            const latLngs = [];

            window.coeData.forEach(row => {
                const cgm = (row.CGM || '').trim();
                const tipo = (row['Tipo Evento'] || '').trim();
                const fecha = (row.Fecha || '').trim();

                // Evaluar todos los filtros
                if (fCgm !== 'ALL' && cgm !== fCgm) return;
                if (fTipo !== 'ALL' && tipo !== fTipo) return;
                if (fFecha !== 'ALL' && fecha !== fFecha) return;

                let coordsStr = (row.Coordenadas || "").trim();
                if (!coordsStr) return;
                
                // Remover posibles comillas si quedaron en el parsing y dividir por la coma
                coordsStr = coordsStr.replace(/['"]/g, '');
                let parts = coordsStr.split(',');
                if (parts.length < 2) return;

                const lat = parseFloat(parts[0].trim());
                const lng = parseFloat(parts[1].trim());

                if (isNaN(lat) || isNaN(lng)) return;

                // Asignar Color e Ícono según el tipo de evento
                let tipoEventoLower = tipo.toLowerCase();
                let svgUsado = svgIconos.alerta;
                let bgColor = '#D34872'; // Magenta por defecto (alerta general)

                if (tipoEventoLower.includes('anegamiento') || tipoEventoLower.includes('agua') || tipoEventoLower.includes('inundacion')) {
                    svgUsado = svgIconos.anegamiento;
                    bgColor = '#4AB5E0'; // Celeste
                } else if (tipoEventoLower.includes('arbol') || tipoEventoLower.includes('árbol') || tipoEventoLower.includes('rama')) {
                    svgUsado = svgIconos.arbol;
                    bgColor = '#19567C'; // Azul Oscuro (o verde si prefieres)
                } else if (tipoEventoLower.includes('poste') || tipoEventoLower.includes('cable') || tipoEventoLower.includes('luz')) {
                    svgUsado = svgIconos.poste;
                    bgColor = '#F59E0B'; // Naranja/Amarillo Alerta Eléctrica
                }

                const iconHtml = `<div class="marker-container"><div class="marker-circle" style="background-color: ${bgColor}; border: 2px solid white; box-shadow: 0 0 3px rgba(0,0,0,0.5);">${svgUsado}</div></div>`;
                const customIcon = L.divIcon({
                    html: iconHtml,
                    className: 'custom-div-icon',
                    iconSize: [24, 24], 
                    iconAnchor: [12, 12]
                });

                const marker = L.marker([lat, lng], { icon: customIcon });

                let popupHtml = `
                    <div class="font-sans min-w-[220px]">
                        <h4 class="font-bold border-b border-[#E6EDF3] pb-1 mb-2" style="color: ${bgColor};">${tipo}</h4>

                            <li><b class="text-[#0F172A]">CGM:</b> ${cgm || '-'}</li>
                        </ul>
                    </div>`;
                
                marker.bindPopup(popupHtml);
                layerEventosTormenta.addLayer(marker);
                latLngs.push([lat, lng]);

            // Ajustar el zoom automáticamente si hay puntos filtrados
            if (latLngs.length > 0 && map.hasLayer(layerEventosTormenta)) {
                const zoomBounds = L.latLngBounds(latLngs);
                map.fitBounds(zoomBounds, { padding: [30, 30] });

        // ---------- NUEVO: ARROYOS DESBORDADOS -----------
        async function cargarArroyosDesbordados() {
            const cb = document.getElementById('cb-arroyos-desbordados');
            const label = cb.closest('label');
            label.classList.add('layer-loading');

            try {
                // Leer ambos archivos en paralelo para mayor velocidad
                const [csvRes, geoRes] = await Promise.all([
                    fetch('./arroyos.csv'),
                    fetch('./ARROYOS.geojson')
                ]);

                if (!csvRes.ok) throw new Error("Archivo arroyos.csv no encontrado.");
                if (!geoRes.ok) throw new Error("Archivo ARROYOS.geojson no encontrado.");

                const csvText = await csvRes.text();
                const geoData = await geoRes.json();

                window.arroyosGeojsonData = sanearGeoJSON(geoData);

                const cleanCsvText = csvText.replace(/^\uFEFF/, '');
                
                Papa.parse(cleanCsvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        window.arroyosCsvData = results.data;
                        arroyosDesbordadosLoaded = true;
                        document.getElementById('filtros-arroyos-desbordados').classList.remove('hidden');
                        poblarFiltrosArroyosDesbordados();
                        filtrarYRenderizarArroyosDesbordados();
                        label.classList.remove('layer-loading');
                    }
                });
            } catch(err) {
                console.error("Error al cargar Arroyos Desbordados:", err);
                alert("Error al cargar datos de arroyos. Verifica que arroyos.csv y ARROYOS.geojson existan.");
                cb.checked = false;
                label.classList.remove('layer-loading');
            }
        }

        function poblarFiltrosArroyosDesbordados() {
            const fechas = new Set();

            window.arroyosCsvData.forEach(row => {
                if (row.Fecha) fechas.add(row.Fecha.trim());
            });

            const arrayFechas = Array.from(fechas).filter(f => f !== '').sort((a,b) => b.localeCompare(a));
            const selectFecha = document.getElementById('filtro-arroyo-fecha');
            selectFecha.innerHTML = selectFecha.options[0].outerHTML;
            arrayFechas.forEach(val => {
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = val;
                selectFecha.appendChild(opt);
            });
        }

        function filtrarYRenderizarArroyosDesbordados() {
            layerArroyosDesbordados.clearLayers();
            
            const fFecha = document.getElementById('filtro-arroyo-fecha').value;

            // 1. Encontrar qué arroyos están desbordados
            let desbordadosMap = {}; 
            
            window.arroyosCsvData.forEach(row => {
                const fecha = (row.Fecha || '').trim();
                const estado = (row.Estado_Arroyo || '').trim().toUpperCase();
                const nombre = (row.Arroyo || '').trim();

                // Foco del proceso: Solo si está desbordado
                if (estado !== 'DESBORDADO') return;
                
                // Filtro por fecha si aplica
                if (fFecha !== 'ALL' && fecha !== fFecha) return;

                if (!desbordadosMap[nombre]) desbordadosMap[nombre] = [];
                desbordadosMap[nombre].push(row);
            });

            // Si no hay ninguno desbordado bajo estos filtros, salimos
            if (Object.keys(desbordadosMap).length === 0) return;

            // 2. Extraer solo las líneas de esos arroyos específicos desde el GeoJSON
            const featuresRenderizar = window.arroyosGeojsonData.features.filter(f => {
                let name = f.properties.name || f.properties.NOMBRE || f.properties.Name;
                return name && desbordadosMap[name];
            });

            if (featuresRenderizar.length === 0) return;

            // 3. Renderizar las líneas en ROJO
            const geoLayer = L.geoJSON({ type: 'FeatureCollection', features: featuresRenderizar }, {
                style: { color: '#DC2626', weight: 6, opacity: 0.9 }, // Color Rojo de emergencia y trazo grueso
                onEachFeature: function(feature, layer) {
                    let name = feature.properties.name || feature.properties.NOMBRE || feature.properties.Name || "Arroyo";
                    let umbral = feature.properties.umbral_desborde || feature.properties['UMBRAL DESBORDE'] || "Sin datos";
                    let registros = desbordadosMap[name];
                    
                    let popupHtml = `<div class="font-sans min-w-[240px]">
                        <h4 class="font-bold text-[#DC2626] border-b border-[#FECACA] pb-1.5 mb-2 flex items-center gap-1">
                            <i class="fa-solid fa-water"></i> Desborde: ${name}
                        </h4>
                        <div class="mb-2 text-xs">
                            <b class="text-[#0F172A]">Umbral de Desborde:</b> <span class="text-[#DC2626] font-bold">${umbral} mts</span>
                        </div>
                        <div class="max-h-[180px] overflow-y-auto custom-scrollbar pr-1 space-y-2">`;
                    
                    registros.forEach(r => {
                        let cgmStr = r.CGM ? `(CGM: ${r.CGM})` : '';
                        popupHtml += `
                            <div class="bg-[#FEF2F2] p-2 rounded border border-[#FECACA] text-xs">
                                <p><b class="text-[#0F172A]">${r.Fecha} ${r.Hora}</b> ${cgmStr}</p>
                                <p class="text-[#B91C1C] mt-0.5"><b>Nivel Medido:</b> ${r['Nivel Arroyo']} cm</p>
                            </div>`;
                    });

                    popupHtml += `</div></div>`;
                    layer.bindPopup(popupHtml);
                    layer.bindTooltip(name, { direction: 'top', className: 'custom-map-tooltip' });
                }
            });

            layerArroyosDesbordados.addLayer(geoLayer);
            
            // Auto Zoom a las áreas desbordadas
            if (map.hasLayer(layerArroyosDesbordados)) {
                const bounds = geoLayer.getBounds();
                if (bounds.isValid()) {
                    map.fitBounds(bounds, { padding: [30, 30] });
                }
            }
        }

        function poblarFiltrosTareas() {
            const cgms = new Set();
            const tipos = new Set();
            const subtipos = new Set();
            const fechas = new Set();

            window.sgrData.forEach(row => {
                if (row.Zonificacion_CAV) cgms.add(row.Zonificacion_CAV.trim());
                if (row.Tipo) tipos.add(row.Tipo.trim());
                if (row['Sub Tipo']) subtipos.add(row['Sub Tipo'].trim());
                if (row.Fecha) fechas.add(row.Fecha.trim());
            });

            const poblarSelect = (id, setValores) => {
                const select = document.getElementById(id);
                select.innerHTML = select.options[0].outerHTML; 
                Array.from(setValores).sort().forEach(val => {
                    if (val === '') return;
                    const opt = document.createElement('option');
                    opt.value = val;
                    opt.textContent = val;
                    select.appendChild(opt);
                });
            };

            poblarSelect('filtro-cgm', cgms);
            poblarSelect('filtro-tipo', tipos);
            poblarSelect('filtro-subtipo', subtipos);

            // Ordenar Fechas (DD/MM/YYYY) de manera descendente
            const arrayFechas = Array.from(fechas).filter(f => f !== '').sort((a,b) => {
                const [d1, m1, y1] = a.split('/');
                const [d2, m2, y2] = b.split('/');
                return new Date(y2, m2-1, d2) - new Date(y1, m1-1, d1);
            });
            
            const selectFecha = document.getElementById('filtro-fecha');
            selectFecha.innerHTML = selectFecha.options[0].outerHTML;
            arrayFechas.forEach(val => {
                const opt = document.createElement('option');
                opt.value = val;
                opt.textContent = val;
                selectFecha.appendChild(opt);
            });
        }

                const cgm = (row.Zonificacion_CAV || '').trim();
                const tipo = (row.Tipo || '').trim();
                const subtipo = (row['Sub Tipo'] || '').trim();
                const fecha = (row.Fecha || '').trim();

                // Evaluar todos los filtros
                if (fCgm !== 'ALL' && cgm !== fCgm) return;
                if (fTipo !== 'ALL' && tipo !== fTipo) return;
                if (fSubtipo !== 'ALL' && subtipo !== fSubtipo) return;
                if (fFecha !== 'ALL' && fecha !== fFecha) return;

                if (!row.Latitud || !row.Longitud) return;

                const lat = parseFloat(row.Latitud.replace(',', '.'));
                const lng = parseFloat(row.Longitud.replace(',', '.'));

                if (isNaN(lat) || isNaN(lng)) return;

                const iconHtml = `<div class="marker-container"><div class="marker-circle" style="background-color: #0B5F8D; border: 2px solid white; box-shadow: 0 0 3px rgba(0,0,0,0.5);">${svgIconos.preventiva}</div></div>`;
                const customIcon = L.divIcon({
                    html: iconHtml,
                    className: 'custom-div-icon',
                    iconSize: [24, 24], 
                    iconAnchor: [12, 12]
                });

                const marker = L.marker([lat, lng], { icon: customIcon });

                let popupHtml = `
                    <div class="font-sans min-w-[220px]">
                        <h4 class="font-bold text-[#0B5F8D] border-b border-[#E6EDF3] pb-1 mb-2">${tipo}</h4>
                        <ul class="text-xs text-[#64748B] space-y-1.5">
                            <li><b class="text-[#0F172A]">Sub Tipo:</b> ${subtipo}</li>
                            <li><b class="text-[#0F172A]">Dirección:</b> ${row.Direccion || '-'}</li>
                            <li><b class="text-[#0F172A]">Vecino:</b> ${row.Nombre || ''} ${row.Apellido || ''}</li>
                            <li><b class="text-[#0F172A]">Fecha:</b> ${fecha}</li>
                            <li><b class="text-[#0F172A]">Estado:</b> <span class="text-green-600 font-bold">${row.Estado || '-'}</span></li>
                            <li><b class="text-[#0F172A]">Zonificación:</b> ${cgm || '-'}</li>
                        </ul>
                    </div>`;
                
                marker.bindPopup(popupHtml);
                layerTareasPreventivas.addLayer(marker);
                latLngs.push([lat, lng]);
            });

            // Ajustar el zoom automáticamente si hay puntos filtrados
            if (latLngs.length > 0 && map.hasLayer(layerTareasPreventivas)) {
                const zoomBounds = L.latLngBounds(latLngs);
                map.fitBounds(zoomBounds, { padding: [30, 30] });
            }
        }

        // LÓGICA PRINCIPAL DE INICIALIZACIÓN
        function initMap() {
            const mapContainer = document.getElementById('map');
            if (!mapContainer) return;

            map = L.map('map').setView([-34.7573, -58.4035], 12);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            layerTareasPreventivas = L.layerGroup();
            layerEventosTormenta = L.layerGroup();
            layerCortesLuz = L.layerGroup();
            layerArroyosDesbordados = L.layerGroup();

            const setupLayerControl = (checkboxId, configParams) => {
                const cb = document.getElementById(checkboxId);
                if (!cb) return;
                
                layerInstances[checkboxId] = L.layerGroup();
                const layer = layerInstances[checkboxId];

                // Carga inicial y listeners
                const handleLayerToggle = async (isChecked) => {
                    if (isChecked) {
                        if (!layer.hasLoaded) {
                            try {
                                const label = cb.closest('label');
                                label.classList.add('layer-loading');
                                
                                const response = await fetch(configParams.url);
                                
                                if (!response.ok) throw new Error("HTTP " + response.status);
                                const data = await response.json();
                                
                                // Enrutador para usar los renders especializados
                                if (configParams.type === 'poblacion') {
                                    renderizarCapaPoblacion(data, layer);
                                } else if (configParams.type === 'pobreza') {
                                    renderizarCapaPobreza(data, layer);
                                } else if (configParams.type === 'inundables') {
                                    renderizarCapaInundables(data, layer);
                                } else if (configParams.type === 'arroyos') {
                                    renderizarCapaArroyos(data, layer);
                                } else {
                                    renderizarCapaGenerica(data, layer, configParams.style);
                                }

                                layer.hasLoaded = true;
                            } catch (err) {
                                console.error(`Error al cargar capa: ${configParams.url}`, err);
                                alert(`No se pudo cargar la información. Verifica que el archivo exista en la ruta: ${configParams.url}`);
                                cb.checked = false;
                            } finally {
                                const label = cb.closest('label');
                                label.classList.remove('layer-loading');
                            }
                        }
                        if (cb.checked) map.addLayer(layer);
                    } else {
                        map.removeLayer(layer);
                    }
                };

                cb.addEventListener('change', (e) => handleLayerToggle(e.target.checked));
            };

            // Setup de Control Especial: Tareas Preventivas CSV
            const cbTareas = document.getElementById('cb-tareas-preventivas');
            if (cbTareas) {
                cbTareas.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        map.addLayer(layerTareasPreventivas);
                        if (!sgrLoaded) cargarTareasPreventivas();
                        else filtrarYRenderizarTareas();
                    } else {
                        map.removeLayer(layerTareasPreventivas);
                        document.getElementById('filtros-tareas').classList.add('hidden'); 
                    }
                });
            }

            // Setup Eventos de Cambio en Filtros Tareas Preventivas
            ['filtro-cgm', 'filtro-tipo', 'filtro-subtipo', 'filtro-fecha'].forEach(id => {
                document.getElementById(id).addEventListener('change', () => {
                    if(document.getElementById('cb-tareas-preventivas').checked) {
                        filtrarYRenderizarTareas();
                    }
                });
            });

            // Setup de Control Especial: Eventos Tormenta CSV
            const cbEventos = document.getElementById('cb-eventos-tormenta');
            if (cbEventos) {
                cbEventos.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        map.addLayer(layerEventosTormenta);
                        if (!coeLoaded) cargarEventosTormenta();
                        else filtrarYRenderizarEventos();
                    } else {
                        map.removeLayer(layerEventosTormenta);
                        document.getElementById('filtros-eventos').classList.add('hidden'); 
                    }
                });
            }

            // Setup Eventos de Cambio en Filtros Eventos Tormenta
            ['filtro-evt-fecha', 'filtro-evt-cgm', 'filtro-evt-tipo'].forEach(id => {
                document.getElementById(id).addEventListener('change', () => {
                    if(document.getElementById('cb-eventos-tormenta').checked) {
                        filtrarYRenderizarEventos();
                    }
                });
            });

            // Setup de Control Especial: Cortes de Luz CSV
            const cbCortesLuz = document.getElementById('cb-cortes-luz');
            if (cbCortesLuz) {
                cbCortesLuz.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        map.addLayer(layerCortesLuz);
                        if (!cortesLoaded) cargarCortesLuz();
                        else filtrarYRenderizarCortes();
                    } else {
                        map.removeLayer(layerCortesLuz);
                        document.getElementById('filtros-cortes-luz').classList.add('hidden'); 
                    }
                });
            }

            // Setup Eventos de Cambio en Filtros Cortes de Luz
            ['filtro-corte-fecha', 'filtro-corte-cgm', 'filtro-corte-tipo'].forEach(id => {
                document.getElementById(id).addEventListener('change', () => {
                    if(document.getElementById('cb-cortes-luz').checked) {
                        filtrarYRenderizarCortes();
                    }
                });
            });

            // Setup de Control Especial: Arroyos Desbordados
            const cbArroyosDesb = document.getElementById('cb-arroyos-desbordados');
            if (cbArroyosDesb) {
                cbArroyosDesb.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        map.addLayer(layerArroyosDesbordados);
                        if (!arroyosDesbordadosLoaded) cargarArroyosDesbordados();
                        else filtrarYRenderizarArroyosDesbordados();
                    } else {
                        map.removeLayer(layerArroyosDesbordados);
                        document.getElementById('filtros-arroyos-desbordados').classList.add('hidden'); 
                    }
                });
            }

            // Setup Filtro de Arroyos Desbordados
            const fArroyoFecha = document.getElementById('filtro-arroyo-fecha');
            if (fArroyoFecha) {
                fArroyoFecha.addEventListener('change', () => {
                    if(cbArroyosDesb && cbArroyosDesb.checked) {
                        filtrarYRenderizarArroyosDesbordados();
                    }
                });
            }

            for (const checkboxId in CONFIG_CAPAS) {
                setupLayerControl(checkboxId, CONFIG_CAPAS[checkboxId]);
            }

            function updateMapZoomClass() {
                if (!map) return;
                const zoom = map.getZoom();
                const mapDomContainer = document.getElementById('map');
                
                mapDomContainer.classList.remove('map-zoom-far', 'map-zoom-medium', 'map-zoom-high');
                if (zoom < 13) mapDomContainer.classList.add('map-zoom-far');
                else if (zoom <= 15) mapDomContainer.classList.add('map-zoom-medium');
                else mapDomContainer.classList.add('map-zoom-high');
            }
            
            map.on('zoomend', updateMapZoomClass);
            updateMapZoomClass();

            // FIX: Forzar recálculo del mapa cuando se carga el contenedor para evitar grises
            setTimeout(function() {
                if (map) {
                    map.invalidateSize();
                }
            }, 500);

            // Cargar municipio automáticamente al iniciar
            setTimeout(() => {
                const cbMuni = document.getElementById('cb-municipio');
                if (cbMuni && cbMuni.checked) {
                    cbMuni.dispatchEvent(new Event('change'));
                }
            }, 800);
            
            // Vigilar el contenedor del mapa para recalibrar en caso de que Flexbox se reajuste
            const resizeObserver = new ResizeObserver(() => {
                if (map) map.invalidateSize();
            });
            resizeObserver.observe(document.getElementById('map'));
        }

        document.addEventListener('DOMContentLoaded', () => {
            initMap();
        });

    </script>
</body>
</html>
